<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06203c">
  <title>暗海探秘</title>
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<script>
(function () {
  const UPDATE_VERSION = "2026-06-28-v1";
  const STORAGE_KEY = "shuimu_update_notice_seen";

  if (localStorage.getItem(STORAGE_KEY) !== UPDATE_VERSION) {
    alert(
     "修复了排行榜问题，有其他问题请留言\n\n" +
      "祝你游戏愉快！"
    );

    localStorage.setItem(STORAGE_KEY, UPDATE_VERSION);
  }
})();

<body>
  <div id="app">
    <div id="stage">
      <canvas id="game" width="1600" height="900"></canvas>

      <div id="overlays">
        <!-- Loading -->
        <div id="loading" class="overlay">
          <div class="loading-box">
            <div class="loading-title">暗海探秘</div>
            <div class="loading-bar"><div id="loading-fill"></div></div>
            <div id="loading-text" class="loading-text">正在加载资源…</div>
          </div>
        </div>

        <!-- Settings panel (anchored top-left, matches Python settings_panel_rect) -->
        <div id="settings-panel" class="panel hidden">
          <div class="panel-title">设置</div>
          <div class="row">
            <span class="row-label">背景音乐</span>
            <input id="music-slider" class="slider" type="range" min="0" max="100" value="55">
            <span id="music-pct" class="row-pct">55%</span>
          </div>
          <div class="row">
            <span class="row-label">音效</span>
            <input id="sfx-slider" class="slider" type="range" min="0" max="100" value="100">
            <span id="sfx-pct" class="row-pct">100%</span>
          </div>
          <div class="row">
            <span class="row-label">帧率</span>
            <div class="seg" id="fps-seg">
              <button class="seg-btn" data-fps="60">60</button>
              <button class="seg-btn" data-fps="120">120</button>
            </div>
          </div>
          <div class="row">
            <span class="row-label">昵称</span>
            <span id="nick-display" class="nick-display">匿名用户</span>
            <button id="nick-edit-btn" class="mini-btn">修改</button>
          </div>
          <div class="row">
            <span class="row-label">操作</span>
            <button id="newgame-btn" class="wide-btn">新开一局</button>
            <button id="sync-btn" class="wide-btn">同步排行</button>
          </div>
        </div>

        <!-- Nickname prompt -->
        <div id="nickname-modal" class="overlay modal-shade hidden">
          <div class="modal-box nick-box">
            <div id="nick-title" class="modal-title">输入昵称</div>
            <div class="modal-hint">留空默认匿名用户</div>
            <input id="nick-input" class="nick-input" type="text" maxlength="12" placeholder="匿名用户">
            <div id="nick-status" class="nick-status" aria-live="polite"></div>
            <button id="nick-confirm" class="primary-btn">确认</button>
          </div>
        </div>

        <!-- Leaderboard TOP 50 modal -->
        <div id="leaderboard-modal" class="overlay modal-shade hidden">
          <div class="modal-box rank-box">
            <div class="modal-title glow">全服排行榜 TOP 50</div>
            <button id="rank-close" class="close-btn">✕</button>
            <div id="rank-status" class="rank-status">正在加载…</div>
            <div class="rank-columns">
              <ol id="rank-col-a" class="rank-col" start="1"></ol>
              <ol id="rank-col-b" class="rank-col" start="26"></ol>
            </div>
          </div>
        </div>

        <!-- Game over -->
        <div id="gameover" class="overlay modal-shade hidden">
          <div class="gameover-content">
            <div class="gameover-title glow">游戏结束</div>
            <div id="gameover-score" class="gameover-score">得分 0</div>
            <div id="gameover-level" class="gameover-level">最高等级 1</div>
            <div id="gameover-submit" class="gameover-submit"></div>
            <button id="restart-btn" class="primary-btn big">再来一把</button>
          </div>
        </div>
      </div>
    </div>
    <div id="rotate-hint">请旋转设备至横屏以获得最佳体验</div>
  </div>

  <script src="static/js/matter.min.js"></script>
  <script src="static/js/config.js"></script>
  <script type="module" src="static/js/main.js"></script>
<label style="display:none;"><a href="https://smalltool.github.io/">一键仿站工具</a></label></body>
</html>
